# ============================================================
# SIA — GitHub Actions CI/CD Pipeline
# Triggers: push to main, or scheduled every 30 minutes
#
# Flow:
#   1. Build backend Docker image → push to ECR
#   2. Build frontend Docker image → push to ECR
#   3. SSH into EC2 → pull new images → restart containers
# ============================================================

name: Build & Deploy to AWS

on:
  push:
    branches:
      - main
  schedule:
   # Auto-deploy every 5 minutes to sync with latest GitHub changes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no changes"
        required: false
        default: "false"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE: sia-backend
  FRONTEND_IMAGE: sia-frontend

jobs:
  # ── Job 1: Build & Push Backend ────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

  # ── Job 2: Build & Push Frontend ───────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://${{ secrets.EC2_HOST }}:8000
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

  # ── Job 3: Deploy to EC2 ────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "=== SIA Auto-Deploy (every 5min): $(date) ==="

            # Pull latest code from GitHub
            cd /opt/sia
            git pull origin main
            echo "✓ Code updated from GitHub"

            # Authenticate with ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            echo "✓ ECR login successful"

            # Export env for docker compose
            export ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            export IMAGE_TAG=latest

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            echo "✓ Images pulled from ECR"

            # Rolling restart: backend first, then frontend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "✓ Containers restarted"

            # Wait for backend health check
            sleep 10
            curl -sf http://localhost:8000/health && echo "✓ Backend healthy" || echo "⚠ Backend health check failed"

            # Clean up old images
            docker image prune -f
            echo "=== Deploy complete: $(date) ==="
