# ============================================================
# SIA — GitHub Actions CI/CD Pipeline
# Triggers: push to main, or scheduled every 30 minutes
#
# Flow:
#   1. Build backend Docker image → push to ECR
#   2. Build frontend Docker image → push to ECR
#   3. SSH into EC2 → pull new images → restart containers
# ============================================================

name: Build & Deploy to AWS

on:
  push:
    branches:
      - main
  schedule:
   # Auto-deploy every 5 minutes to sync with latest GitHub changes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no changes"
        required: false
        default: "false"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE: sia-backend
  FRONTEND_IMAGE: sia-frontend

jobs:
  # ── Job 1: Build & Push Backend ────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

  # ── Job 2: Build & Push Frontend ───────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=http://${{ secrets.EC2_HOST }}:8000
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

  # ── Job 3: Deploy to EC2 ────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Optional: base64-encoded backend env file to seed /opt/sia/.env.backend
          BACKEND_ENV_BASE64: ${{ secrets.BACKEND_ENV_BASE64 }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,ECR_REGISTRY,BACKEND_ENV_BASE64
          script: |
            set -e
            echo "=== SIA Auto-Deploy (every 5min): $(date) ==="

            # Pull latest code from GitHub
            cd /opt/sia
            git pull origin main
            echo "✓ Code updated from GitHub"

            # Authenticate with ECR
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY
            echo "✓ ECR login successful"

            # Ensure backend env file exists
            BACKEND_ENV_FILE="/opt/sia/.env.backend"
            BACKEND_ENV_TEMPLATE="/opt/sia/backend/.env.example"
            MIN_BACKEND_ENV_B64_LENGTH=16 # 16 base64 chars ≈ 12 decoded bytes; smaller payloads won't be a real env file.
            if [ -n "${BACKEND_ENV_BASE64:-}" ]; then
              BACKEND_ENV_CLEAN="$(printf '%s' "$BACKEND_ENV_BASE64" | tr -d '\n\r\t ')"
              if [ -z "$BACKEND_ENV_CLEAN" ]; then
                echo "❌ BACKEND_ENV_BASE64 is empty." >&2
                exit 1
              fi
              if [ "${#BACKEND_ENV_CLEAN}" -lt "$MIN_BACKEND_ENV_B64_LENGTH" ]; then
                echo "❌ BACKEND_ENV_BASE64 is too short to be a valid env file." >&2
                exit 1
              fi
              # Accept standard (+/) and URL-safe (-_) base64 alphabets.
              if ! printf '%s' "$BACKEND_ENV_CLEAN" | grep -Eq '^[A-Za-z0-9+/_-]+={0,2}$'; then
                echo "❌ BACKEND_ENV_BASE64 contains invalid characters." >&2
                exit 1
              fi
              BACKEND_ENV_DECODE_INPUT="$(printf '%s' "$BACKEND_ENV_CLEAN" | tr '_-' '/+')"
              ENV_TMP_DIR="$(mktemp -d -t backend-env.XXXXXX)"
              if [ -z "$ENV_TMP_DIR" ] || [ ! -d "$ENV_TMP_DIR" ]; then
                echo "❌ Unable to create temp directory for env payload." >&2
                exit 1
              fi
              chmod 700 "$ENV_TMP_DIR"
              TMP_ENV_FILE="$ENV_TMP_DIR/env"
              TMP_ENV_ERR="$ENV_TMP_DIR/err"
              cleanup_env_tmp() {
                rm -f "$TMP_ENV_FILE" "$TMP_ENV_ERR"
                rmdir "$ENV_TMP_DIR" 2>/dev/null || true
              }
              trap cleanup_env_tmp EXIT
              if printf '%s' "$BACKEND_ENV_DECODE_INPUT" | base64 --decode > "$TMP_ENV_FILE" 2> "$TMP_ENV_ERR"; then
                if [ ! -s "$TMP_ENV_FILE" ]; then
                  echo "❌ BACKEND_ENV_BASE64 decoded to an empty file." >&2
                  exit 1
                fi
                mv -f "$TMP_ENV_FILE" "$BACKEND_ENV_FILE"
                chmod 600 "$BACKEND_ENV_FILE"
                echo "✓ Backend env loaded from BACKEND_ENV_BASE64 secret"
              else
                DECODE_ERROR="$(cat "$TMP_ENV_ERR")"
                echo "❌ Failed to decode BACKEND_ENV_BASE64: ${DECODE_ERROR:-unknown error}." >&2
                exit 1
              fi
            elif [ ! -f "$BACKEND_ENV_FILE" ]; then
              if [ -f "$BACKEND_ENV_TEMPLATE" ]; then
                cp "$BACKEND_ENV_TEMPLATE" "$BACKEND_ENV_FILE"
                chmod 600 "$BACKEND_ENV_FILE"
                echo "❌ Backend env file missing. Template copied to /opt/sia/.env.backend, but production deploys require the BACKEND_ENV_BASE64 secret with real values. Set it and re-run the workflow." >&2
                exit 1
              else
                echo "❌ Missing backend env file and no template available. Aborting deploy." >&2
                exit 1
              fi
            fi

            # Export env for docker compose
            export IMAGE_TAG=latest

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull
            echo "✓ Images pulled from ECR"

            # Rolling restart: backend first, then frontend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "✓ Containers restarted"

            # Wait for backend health check
            sleep 30
            curl -sf http://localhost:8000/health && echo "✓ Backend healthy" || echo "⚠ Backend health check failed"

            # Clean up old images
            docker image prune -f
            echo "=== Deploy complete: $(date) ==="
