# ============================================================
# SIA — Docker Compose (Development / Local)
# Usage: make up  OR  docker compose up --build
# ============================================================

version: "3.9"

services:
  # ── Backend (FastAPI) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sia-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sia-network
    labels:
      - "com.sia.service=backend"
      - "com.sia.version=1.0.0"

  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    container_name: sia-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sia-network
    labels:
      - "com.sia.service=frontend"
      - "com.sia.version=1.0.0"

networks:
  sia-network:
    driver: bridge
    name: sia-network
