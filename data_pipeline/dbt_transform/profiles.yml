omni_revenue:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('SUPABASE_DB_HOST', 'db.your_project.supabase.co') }}"
      port: 5432
      user: "{{ env_var('SUPABASE_DB_USER', 'postgres') }}"
      password: "{{ env_var('SUPABASE_DB_PASSWORD', 'your_password') }}"
      dbname: "{{ env_var('SUPABASE_DB_NAME', 'postgres') }}"
      schema: analytics_mart
      threads: 4
