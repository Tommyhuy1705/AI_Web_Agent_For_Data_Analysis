version: 2

sources:
  - name: public
    schema: public
    tables:
      - name: raw_market_intel
        description: "Raw market intelligence data from TinyFish crawlers"
      - name: raw_sales
        description: "Raw sales data from mock data loader"

models:
  - name: stg_dim_products
    description: "Dimension table for products, extracted from raw_staging JSONB data"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Product name"
        tests:
          - not_null

  - name: stg_dim_customers
    description: "Dimension table for customers, extracted from raw_staging JSONB data"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Customer full name"
        tests:
          - not_null

  - name: stg_fact_sales
    description: "Fact table for sales transactions, joined with dim tables"
    columns:
      - name: sale_id
        description: "Unique sale identifier"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Business order identifier from raw source"
        tests:
          - unique
          - not_null
      - name: order_date
        description: "Date of the order"
        tests:
          - not_null
      - name: total_amount
        description: "Total transaction amount"
        tests:
          - not_null

  - name: stg_competitor_prices
    description: "Competitor prices extracted from TinyFish market intelligence crawls (Shopee, Tiki, Alibaba)"
    columns:
      - name: competitor_price_id
        description: "Unique competitor price record identifier"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Competitor product name"
        tests:
          - not_null
      - name: source
        description: "Data source (shopee, tiki, alibaba)"
        tests:
          - not_null
      - name: price
        description: "Current selling price in VND"
